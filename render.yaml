services:
  # Background Worker — runs the bot 24/7 (no HTTP port needed)
  - type: web
    name: crypto-signal-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore  # closest to India
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: POLL_INTERVAL
        value: "60"
      - key: TRADE_UPDATE_INTERVAL
        value: "300"
      - key: CONFIDENCE_THRESHOLD
        value: "0.65"
      - key: AUTO_TRADE_ENABLED
        value: "true"
      - key: POSITION_SIZE_USD
        value: "50.0"
      - key: BINANCE_TESTNET_API_KEY
        sync: false
      - key: BINANCE_TESTNET_SECRET
        sync: false
